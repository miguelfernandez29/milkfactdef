<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/header :: head('View Product')"></head>
<body>
<nav th:replace="layout/header :: navbar"></nav>

<div class="container">
    <div class="row">
        <div class="col-12">
            <h2><i class="bi bi-box"></i> View Product</h2>
            <hr>
        </div>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h5>Product Details</h5>
                </div>
                <div class="card-body">
                    <table class="table table-bordered">
                        <tr>
                            <th style="width: 30%;">ID</th>
                            <td th:text="${product.id}"></td>
                        </tr>
                        <tr>
                            <th>Name</th>
                            <td th:text="${product.name}"></td>
                        </tr>
                        <tr>
                            <th>Description</th>
                            <td th:text="${product.description}"></td>
                        </tr>
                        <tr>
                            <th>Price</th>
                            <td th:text="${#numbers.formatDecimal(product.price, 1, 2)}"></td>
                        </tr>
                    </table>
                </div>
                <div class="card-footer">
                    <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-warning">
                        <i class="bi bi-pencil"></i> Edit
                    </a>
                    <a th:href="@{/products}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Back to List
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="layout/footer :: footer"></footer>
<div th:replace="layout/footer :: scripts"></div>
</body>
</html>
