<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/header :: head('Customer Management')"></head>
<body>
<nav th:replace="layout/header :: navbar"></nav>

<div class="container">
    <div class="row">
        <div class="col-12">
            <h2><i class="bi bi-people"></i> Customer Management</h2>
            <hr>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle"></i> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle"></i> <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row mb-3">
        <div class="col-12">
            <a th:href="@{/customers/add}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Add Customer
            </a>
            <a th:href="@{/}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Back to Menu
            </a>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5><i class="bi bi-list"></i> Customer List</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Address Line 1</th>
                                    <th>Address Line 2</th>
                                    <th>Pincode</th>
                                    <th>Phone</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="customer : ${customers}">
                                    <td th:text="${customer.id}"></td>
                                    <td th:text="${customer.name}"></td>
                                    <td th:text="${customer.addressLine1}"></td>
                                    <td th:text="${customer.addressLine2}"></td>
                                    <td th:text="${customer.pincode}"></td>
                                    <td th:text="${customer.phone}"></td>
                                    <td>
                                        <a th:href="@{/customers/view/{id}(id=${customer.id})}" class="btn btn-info btn-sm btn-action">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <a th:href="@{/customers/edit/{id}(id=${customer.id})}" class="btn btn-warning btn-sm btn-action">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <a th:href="@{/customers/delete/{id}(id=${customer.id})}" 
                                           class="btn btn-danger btn-sm btn-action"
                                           onclick="return confirm('Are you sure you want to delete this customer?');">
                                            <i class="bi bi-trash"></i>
                                        </a>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(customers)}">
                                    <td colspan="7" class="text-center">No customers found</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="layout/footer :: footer"></footer>
<div th:replace="layout/footer :: scripts"></div>
</body>
</html>
