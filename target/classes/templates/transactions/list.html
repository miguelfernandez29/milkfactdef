<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/header :: head('Transaction Management')"></head>
<body>
<nav th:replace="layout/header :: navbar"></nav>

<div class="container">
    <div class="row">
        <div class="col-12">
            <h2><i class="bi bi-receipt"></i> Transaction Management</h2>
            <hr>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle"></i> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle"></i> <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row mb-3">
        <div class="col-12">
            <a th:href="@{/transactions/add}" class="btn btn-info text-white">
                <i class="bi bi-plus-circle"></i> Add Transaction
            </a>
            <a th:href="@{/}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Back to Menu
            </a>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5><i class="bi bi-list"></i> Transaction List</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Customer</th>
                                    <th>Product</th>
                                    <th>Quantity</th>
                                    <th>Price</th>
                                    <th>Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="transaction : ${transactions}">
                                    <td th:text="${transaction.id}"></td>
                                    <td th:text="${transaction.customerName}"></td>
                                    <td th:text="${transaction.productName}"></td>
                                    <td th:text="${transaction.quantity}"></td>
                                    <td th:text="${#numbers.formatDecimal(transaction.price, 1, 2)}"></td>
                                    <td th:text="${transaction.transactionDate}"></td>
                                    <td>
                                        <a th:href="@{/transactions/view/{id}(id=${transaction.id})}" class="btn btn-info btn-sm btn-action">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <a th:href="@{/transactions/edit/{id}(id=${transaction.id})}" class="btn btn-warning btn-sm btn-action">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <a th:href="@{/transactions/delete/{id}(id=${transaction.id})}" 
                                           class="btn btn-danger btn-sm btn-action"
                                           onclick="return confirm('Are you sure you want to delete this transaction?');">
                                            <i class="bi bi-trash"></i>
                                        </a>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(transactions)}">
                                    <td colspan="7" class="text-center">No transactions found</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="layout/footer :: footer"></footer>
<div th:replace="layout/footer :: scripts"></div>
</body>
</html>
