<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/header :: head(${pageTitle})"></head>
<body>
<nav th:replace="layout/header :: navbar"></nav>

<div class="container">
    <div class="row">
        <div class="col-12">
            <h2>
                <i class="bi bi-receipt" th:if="${mode == 'add'}"></i>
                <i class="bi bi-pencil-square" th:if="${mode == 'edit'}"></i>
                <span th:text="${pageTitle}"></span>
            </h2>
            <hr>
        </div>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <form th:action="@{/transactions/save}" th:object="${transaction}" method="post">
                        <input type="hidden" th:field="*{id}">
                        <input type="hidden" name="mode" th:value="${mode}">

                        <div class="mb-3">
                            <label for="customerId" class="form-label">Customer <span class="text-danger">*</span></label>
                            <select class="form-select" id="customerId" th:field="*{customerId}"
                                    th:classappend="${#fields.hasErrors('customerId')} ? 'is-invalid' : ''">
                                <option value="">-- Select Customer --</option>
                                <option th:each="customer : ${customers}" 
                                        th:value="${customer.id}" 
                                        th:text="${customer.name}"></option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('customerId')}" th:errors="*{customerId}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="productId" class="form-label">Product <span class="text-danger">*</span></label>
                            <select class="form-select" id="productId" th:field="*{productId}"
                                    th:classappend="${#fields.hasErrors('productId')} ? 'is-invalid' : ''">
                                <option value="">-- Select Product --</option>
                                <option th:each="product : ${products}" 
                                        th:value="${product.id}" 
                                        th:text="${product.name}"></option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('productId')}" th:errors="*{productId}"></div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="quantity" class="form-label">Quantity <span class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="quantity" th:field="*{quantity}" min="1"
                                           th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid' : ''">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="transactionDate" class="form-label">Transaction Date</label>
                                    <input type="date" class="form-control" id="transactionDate" th:field="*{transactionDate}">
                                </div>
                            </div>
                        </div>

                        <div class="mb-3" th:if="${transaction.price != null}">
                            <label class="form-label">Calculated Price</label>
                            <input type="text" class="form-control" th:value="${#numbers.formatDecimal(transaction.price, 1, 2)}" readonly>
                            <small class="text-muted">Price is automatically calculated based on product price and quantity</small>
                        </div>

                        <div class="mb-3">
                            <button type="submit" class="btn btn-info text-white">
                                <i class="bi bi-save"></i> Save
                            </button>
                            <a th:href="@{/transactions}" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="layout/footer :: footer"></footer>
<div th:replace="layout/footer :: scripts"></div>
</body>
</html>
