<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/header :: head('Product Management')"></head>
<body>
<nav th:replace="layout/header :: navbar"></nav>

<div class="container">
    <div class="row">
        <div class="col-12">
            <h2><i class="bi bi-box"></i> Product Management</h2>
            <hr>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle"></i> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle"></i> <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row mb-3">
        <div class="col-12">
            <a th:href="@{/products/add}" class="btn btn-success">
                <i class="bi bi-plus-circle"></i> Add Product
            </a>
            <a th:href="@{/}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Back to Menu
            </a>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5><i class="bi bi-list"></i> Product List</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Description</th>
                                    <th>Price</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="product : ${products}">
                                    <td th:text="${product.id}"></td>
                                    <td th:text="${product.name}"></td>
                                    <td th:text="${product.description}"></td>
                                    <td th:text="${#numbers.formatDecimal(product.price, 1, 2)}"></td>
                                    <td>
                                        <a th:href="@{/products/view/{id}(id=${product.id})}" class="btn btn-info btn-sm btn-action">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-warning btn-sm btn-action">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <a th:href="@{/products/delete/{id}(id=${product.id})}" 
                                           class="btn btn-danger btn-sm btn-action"
                                           onclick="return confirm('Are you sure you want to delete this product?');">
                                            <i class="bi bi-trash"></i>
                                        </a>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(products)}">
                                    <td colspan="5" class="text-center">No products found</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="layout/footer :: footer"></footer>
<div th:replace="layout/footer :: scripts"></div>
</body>
</html>
