<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/header :: head('View Customer')"></head>
<body>
<nav th:replace="layout/header :: navbar"></nav>

<div class="container">
    <div class="row">
        <div class="col-12">
            <h2><i class="bi bi-person"></i> View Customer</h2>
            <hr>
        </div>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h5>Customer Details</h5>
                </div>
                <div class="card-body">
                    <table class="table table-bordered">
                        <tr>
                            <th style="width: 30%;">ID</th>
                            <td th:text="${customer.id}"></td>
                        </tr>
                        <tr>
                            <th>Name</th>
                            <td th:text="${customer.name}"></td>
                        </tr>
                        <tr>
                            <th>Address Line 1</th>
                            <td th:text="${customer.addressLine1}"></td>
                        </tr>
                        <tr>
                            <th>Address Line 2</th>
                            <td th:text="${customer.addressLine2}"></td>
                        </tr>
                        <tr>
                            <th>Pincode</th>
                            <td th:text="${customer.pincode}"></td>
                        </tr>
                        <tr>
                            <th>Phone</th>
                            <td th:text="${customer.phone}"></td>
                        </tr>
                    </table>
                </div>
                <div class="card-footer">
                    <a th:href="@{/customers/edit/{id}(id=${customer.id})}" class="btn btn-warning">
                        <i class="bi bi-pencil"></i> Edit
                    </a>
                    <a th:href="@{/customers}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Back to List
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="layout/footer :: footer"></footer>
<div th:replace="layout/footer :: scripts"></div>
</body>
</html>
