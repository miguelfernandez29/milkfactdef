spring:
  application:
    name: milk-management-system

  datasource:
    url: jdbc:h2:mem:appdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  thymeleaf:
    cache: false

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080